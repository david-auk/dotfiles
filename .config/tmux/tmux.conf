set-option -g detach-on-destroy off
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB,*:Ss=\E[%p1%d q,*:Se=\E[2 q"
set -as terminal-features ",ghostty:RGB"
set -as terminal-features ",xterm*:RGB"
set -g mouse on
set -g escape-time 0  # disable delays on escape sequences

unbind r
bind r source-file ~/.config/tmux/tmux.conf

unbind C-b
set -g prefix C-Space
# set -g prefix C-a
bind C-Space send-prefix

# Shift alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
bind-key b set-option status

# Reuse the active SSH connection when creating panes/windows.
set -g @ssh-split-keep-cwd "true"
set -g @ssh-split-strip-cmd "true"
set -g @ssh-split-keep-remote-cwd "true"

# Preserve the default tmux bindings:
# Prefix + %  -> side-by-side split
# Prefix + "  -> top/bottom split
# Prefix + c  -> new window
set -g @ssh-split-h-key "%"
set -g @ssh-split-v-key '"'
set -g @ssh-split-w-key "c"

set -g @plugin "pschmitt/tmux-ssh-split"
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'niksingh710/minimal-tmux-status'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'wfxr/tmux-fzf-url'

# Custom plugins
set -g @plugin "david-auk/tmux-vim-copy-mode"

#set -g status-position top
set -g @minimal-tmux-status "top"

set -g status-interval 30

# The script includes its own leading space only when an indicator is shown.
set -g @minimal-tmux-status-right '#(~/.config/tmux/scripts/meeting-status) #S'
set -g status-right-length 40

# Make boxes rounded
set -g @minimal-tmux-use-arrow true
set -g @minimal-tmux-right-arrow ""
set -g @minimal-tmux-left-arrow ""

# Inactive windows
set -g window-status-style "fg=#6c7086,bg=default"

# Current window
set -g window-status-current-style "fg=#ffffff,bg=default"

# Optional: make inactive tabs even dimmer
set -g window-status-format "#[fg=#6c7086] #I:#W "

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Aliases for creating new splits

bind "|" split-window -h -c "#{pane_current_path}"
bind "-" split-window -v -c "#{pane_current_path}"

bind -n M-l send-keys C-l

set-window-option -g mode-keys vi
setw -g mode-keys vi

# Display popups

bind C-g display-popup \
  -d "#{pane_current_path}" \
  -w 80% \
  -h 80% \
  -E "lazygit"
bind C-s display-popup \
  -d "#{pane_current_path}" \
  -w 80% \
  -h 80% \
  -E "gurk"
bind C-n display-popup -E 'bash -i -c "read -p \"Session name: \" name; tmux new-session -d -s \$name && tmux switch-client -t \$name"'
bind C-j display-popup -E "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"
bind C-f display-popup \
  -w 80% \
  -h 80% \
  -E 'rmpc'
bind C-t display-popup \
  -d "#{pane_current_path}" \
  -w 75% \
  -h 75% \
  -E "zsh"
bind C-c display-popup \
  -w 75% \
  -h 60% \
  -E "~/.config/tmux/scripts/calendar-popup"

##### Pane resizing #####

# Fine resize: prefix + h/j/k/l
bind H resize-pane -L 2
bind J resize-pane -D 2
bind K resize-pane -U 2
bind L resize-pane -R 2

# Rough resize: prefix + H/J/K/L
bind h resize-pane -L 10
bind j resize-pane -D 10
bind k resize-pane -U 10
bind l resize-pane -R 10
bind-key C-k run-shell -b "~/.config/sesh/scripts/sesh_picker"

run '~/.tmux/plugins/tmp/tmp'
